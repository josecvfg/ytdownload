<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Subtítulos para YouTube</title>
<style>
  :root {
    --bg: #fafafa;
    --card: #ffffff;
    --border: #e4e4e7;
    --text: #27272a;
    --dim: #8b8b93;
    --accent: #3b3b3f;
    --error: #c0392b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    padding: 64px 20px;
  }
  .wrap { max-width: 620px; margin: 0 auto; }

  h1 {
    font-size: 22px;
    font-weight: 600;
    margin: 0 0 8px;
  }
  .subtitle {
    color: var(--dim);
    font-size: 14px;
    margin-bottom: 32px;
    line-height: 1.5;
  }

  form {
    display: flex;
    gap: 10px;
    margin-bottom: 40px;
  }
  input[type="text"] {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 14px;
    padding: 12px 14px;
    border-radius: 8px;
    outline: none;
  }
  input[type="text"]:focus { border-color: #b5b5bd; }
  input[type="text"]::placeholder { color: #b5b5bd; }
  button {
    background: var(--accent);
    color: #fff;
    border: none;
    font-size: 14px;
    font-weight: 500;
    padding: 12px 22px;
    border-radius: 8px;
    cursor: pointer;
  }
  button:hover { background: #000; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  .job {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
    margin-bottom: 12px;
  }
  .job-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
  }
  .job-title {
    font-size: 14px;
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .job-status {
    font-size: 12px;
    color: var(--dim);
    white-space: nowrap;
  }
  .job-status.err { color: var(--error); }
  .job-status.ok { color: #2e7d32; }

  .bar-track {
    margin-top: 12px;
    height: 5px;
    background: #ececef;
    border-radius: 3px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.4s ease;
  }
  .bar-fill.err { background: var(--error); }

  .job-msg { margin-top: 8px; font-size: 12.5px; color: var(--dim); }

  a.dl-btn {
    display: inline-block;
    margin-top: 12px;
    font-size: 13px;
    color: #fff;
    background: var(--accent);
    padding: 7px 16px;
    border-radius: 6px;
    text-decoration: none;
    font-weight: 500;
  }
  a.dl-btn:hover { background: #000; }

  .empty {
    color: var(--dim);
    font-size: 14px;
    padding: 8px 0;
  }
</style>
</head>
<body>
  <div class="wrap">
    <h1>Subtítulos para YouTube</h1>
    <div class="subtitle">
      Pega el link de un video. Se descarga con subtítulos en español,
      centrados en pantalla, y con el brillo un poco reducido.
    </div>

    <form id="job-form">
      <input type="text" id="url-input" placeholder="https://www.youtube.com/watch?v=..." autocomplete="off" required />
      <button type="submit" id="submit-btn">Convertir</button>
    </form>

    <div id="jobs"></div>
    <div class="empty" id="empty-msg">Todavía no hay ningún video en proceso.</div>
  </div>

<script>
const form = document.getElementById('job-form');
const input = document.getElementById('url-input');
const submitBtn = document.getElementById('submit-btn');
const jobsEl = document.getElementById('jobs');
const emptyMsg = document.getElementById('empty-msg');

const STATUS_LABEL = {
  queued: 'En cola',
  downloading: 'Descargando',
  burning: 'Agregando subtítulos',
  done: 'Listo',
  error: 'Error',
};

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const url = input.value.trim();
  if (!url) return;
  submitBtn.disabled = true;
  try {
    await fetch('/api/jobs', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url }),
    });
    input.value = '';
    await refresh();
  } catch (err) {
    console.error(err);
  } finally {
    submitBtn.disabled = false;
  }
});

function renderJob(job) {
  const isErr = job.status === 'error';
  const isDone = job.status === 'done';
  const statusClass = isErr ? 'err' : (isDone ? 'ok' : '');
  const title = job.title || job.url;

  const div = document.createElement('div');
  div.className = 'job';
  div.innerHTML = `
    <div class="job-top">
      <div class="job-title">${escapeHtml(title)}</div>
      <div class="job-status ${statusClass}">${STATUS_LABEL[job.status] || job.status}</div>
    </div>
    <div class="bar-track"><div class="bar-fill ${isErr ? 'err' : ''}" style="width:${job.progress}%"></div></div>
    <div class="job-msg">${escapeHtml(isErr ? (job.error || 'Algo falló') : job.message)}</div>
    ${isDone ? `<a class="dl-btn" href="/api/jobs/${job.id}/download" download>Descargar video</a>` : ''}
  `;
  return div;
}

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

async function refresh() {
  try {
    const res = await fetch('/api/jobs');
    const jobs = await res.json();
    jobsEl.innerHTML = '';
    if (jobs.length === 0) {
      emptyMsg.style.display = 'block';
    } else {
      emptyMsg.style.display = 'none';
      jobs.slice().reverse().forEach(job => jobsEl.appendChild(renderJob(job)));
    }
  } catch (err) {
    console.error(err);
  }
}

setInterval(refresh, 1500);
refresh();
</script>
</body>
</html>
